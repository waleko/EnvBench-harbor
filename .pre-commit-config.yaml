repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: generate-harbor-tasks
        name: Generate Harbor tasks
        entry: bash -c 'uv run generate --output-dir datasets/envbench-harbor --overwrite && git add datasets/envbench-harbor/'
        language: system
        files: 'harbor_adapter/.*'
        pass_filenames: false
